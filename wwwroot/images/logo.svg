<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Coin stack icon -->
  <ellipse cx="20" cy="30" rx="12" ry="4" fill="#4F46E5" opacity="0.25"/>
  <rect x="8" y="20" width="24" height="10" rx="2" fill="#4F46E5" opacity="0.5"/>
  <ellipse cx="20" cy="20" rx="12" ry="4" fill="#4F46E5" opacity="0.7"/>
  <rect x="8" y="12" width="24" height="10" rx="2" fill="#6366F1"/>
  <ellipse cx="20" cy="12" rx="12" ry="4" fill="#818CF8"/>
  <!-- ₹ symbol on top coin -->
  <text x="20" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#fff">₹</text>
  <!-- Wordmark -->
  <text x="44" y="26" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#0F172A">Spend</text>
  <text x="103" y="26" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#4F46E5">Wise</text>
</svg>
